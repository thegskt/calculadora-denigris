<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora HP 12C Simulação</title>
    <style>
        body { background-color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hp-calculator {
            background-color: #222;
            width: 350px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 5px 5px 15px #000;
            border-top: 5px solid #444;
        }
        .display {
            background-color: #a0b0a0;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2em;
            text-align: right;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 20px;
            font-weight: bold;
            height: 40px;
            overflow: hidden;
        }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        button {
            padding: 15px 5px;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #000;
            cursor: pointer;
            color: white;
        }
        /* Cores das teclas */
        .btn-num { background-color: #555; }
        .btn-func { background-color: #d1b464; color: #000; } /* Teclas f/g */
        .btn-op { background-color: #777; }
        .btn-white { background-color: #eee; color: #000; }
        
        /* Função para alinhar as teclas igual à HP */
        .btn-wide { grid-column: span 2; }
    </style>
</head>
<body>

<div class="hp-calculator">
    <div class="display" id="display">0,00</div>
    <div class="keyboard">
        <!-- Linha 1 -->
        <button class="btn-func">n</button>
        <button class="btn-func">i</button>
        <button class="btn-func">PV</button>
        <button class="btn-func">PMT</button>
        <button class="btn-func">FV</button>
        
        <!-- Linha 2 -->
        <button class="btn-op">CHS</button>
        <button class="btn-op">7</button>
        <button class="btn-op">8</button>
        <button class="btn-op">9</button>
        <button class="btn-op">/</button>

        <!-- Linha 3 -->
        <button class="btn-op">EEX</button>
        <button class="btn-op">4</button>
        <button class="btn-op">5</button>
        <button class="btn-op">6</button>
        <button class="btn-op">x</button>

        <!-- Linha 4 -->
        <button class="btn-op">CLx</button>
        <button class="btn-op">1</button>
        <button class="btn-op">2</button>
        <button class="btn-op">3</button>
        <button class="btn-op">-</button>

        <!-- Linha 5 -->
        <button class="btn-op">ENTER</button>
        <button class="btn-op">0</button>
        <button class="btn-op">.</button>
        <button class="btn-op">R↓</button>
        <button class="btn-op">+</button>
    </div>
</div>

<script>
    // Lógica básica RPN
    let display = document.getElementById('display');
    let stack = [];
    let currentInput = "";

    document.querySelectorAll('.btn-op, .btn-num, .btn-func').forEach(button => {
        button.addEventListener('click', () => {
            let val = button.innerText;
            
            if (/\d/.test(val) || val === '.') {
                currentInput += val;
                display.innerText = currentInput;
            } else if (val === 'ENTER') {
                stack.push(parseFloat(currentInput));
                currentInput = "";
            } else if (val === '+') {
                let a = stack.pop();
                let b = parseFloat(currentInput);
                currentInput = (a + b).toString();
                display.innerText = currentInput;
            } else if (val === 'CLx') {
                currentInput = "";
                display.innerText = "0,00";
            }
            // Adicionar lógica de outras teclas (CHS, finanças) aqui...
        });
    });
</script>

</body>
</html>
